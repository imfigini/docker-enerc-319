
    Alias /guarani3 "/app/vendor/siu-toba/framework/www"
    <Directory "/app/vendor/siu-toba/framework/www/">
		SetEnv TOBA_DIR		"/app/vendor/siu-toba/framework"
		Options MultiViews FollowSymLinks
		AllowOverride None
		<IfModule !mod_access_compat.c>
		#Apache 2.2.x
		##Piense en actualizar la version del web server a Apache 2.4.x al menos
		##Si desea seguir en esta version, descomente las siguientes lineas
		#	Order allow,deny
		#	Allow from all
		</IfModule>
		<IfModule mod_access_compat.c>
			#Apache 2.3.x/2.4.x  back-comp (deprecated)
			Order allow,deny
			Allow from all
		</IfModule>
		<IfModule mod_authz_core.c>
			#Apache 2.4.x 
			Require all granted
		</IfModule>
    </Directory>


	#Configuracion del SP de SAML
	Alias /guarani3_sp "/app/vendor/siu-toba/framework/php/3ros/simplesamlphp/www"
	<Directory /app/vendor/siu-toba/framework/php/3ros/simplesamlphp/www>
		SetEnv TOBA_INSTALACION_DIR "/app/instalacion"
		<IfModule !mod_access_compat.c>
		#Apache 2.2.x
		##Piense en actualizar la version del web server a Apache 2.4.x al menos
		##Si desea seguir en esta version, descomente las siguientes lineas
		#	Order allow,deny
		#	Allow from all
		</IfModule>
		<IfModule mod_access_compat.c>
			#Apache 2.3.x/2.4.x  back-comp (deprecated)
			Order allow,deny
			Allow from all
		</IfModule>
		<IfModule mod_authz_core.c>
			#Apache 2.4.x 
			Require all granted
		</IfModule>
	</Directory>

	#Proyecto: toba_editor
	Alias /toba_editor/3.3 "/app/vendor/siu-toba/framework/proyectos/toba_editor/www/"
	<Directory "/app/vendor/siu-toba/framework/proyectos/toba_editor/www/">
		SetEnv TOBA_DIR 		"/app/vendor/siu-toba/framework"
		SetEnv TOBA_PROYECTO 	"toba_editor"
		SetEnv TOBA_INSTALACION_DIR "/app/instalacion"
		SetEnv TOBA_INSTANCIA	"desarrollo"
		DirectoryIndex aplicacion.php

		AllowOverride None
		<IfModule !mod_access_compat.c>
		#Apache 2.2.x
		##Piense en actualizar la version del web server a Apache 2.4.x al menos
		##Si desea seguir en esta version, descomente las siguientes lineas
		#	Order allow,deny
		#	Allow from all
		</IfModule>
		<IfModule mod_access_compat.c>
			#Apache 2.3.x/2.4.x  back-comp (deprecated)
			Order allow,deny
			Allow from all
		</IfModule>
		<IfModule mod_authz_core.c>
			#Apache 2.4.x 
			Require all granted
		</IfModule>

		#API REST
		RewriteEngine On
   		RewriteBase /toba_editor/3.3
		Options FollowSymLinks SymLinksIfOwnerMatch
		RewriteRule ^rest\/(v[\d\.]+)?\/(.*)$ rest.php/$1/$2 [PT,L,QSA,E=API_NOMBRE:$1]
	  	RewriteRule ^rest/(.*)$ rest.php/$1 [PT,L,QSA]
   		RewriteRule ^rest$      rest.php/   [PT,L,QSA]
		SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1
	</Directory>

