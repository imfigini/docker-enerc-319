services:
  # -----------------------------
  # Guaraní 3.19.0 - PHP 7.3 (actual)
  # -----------------------------
  web73:
    build:
      context: .
      dockerfile: Dockerfile.php73
    image: guarani_gestion_php73
    container_name: gestion_incaa_php73
    depends_on:
      - db
    ports:
      - "1040:80"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: guarani3
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    restart: unless-stopped
    volumes:
      - ./gestion_31901:/app
      - ./toba.conf:/etc/apache2/sites-enabled/toba.conf
      - ./toba.conf:/etc/apache2/sites-available/gestion.conf

    # -----------------------------
  # Base de datos
  # -----------------------------
  db:
    image: postgres:11.12
    container_name: gestion_incaa_db319
    environment:
      POSTGRES_DB: guarani3
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5440:5432"
    restart: unless-stopped

volumes:
  postgres_data: